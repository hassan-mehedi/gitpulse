name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: version
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=app-v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate release notes from commits
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --tag ${{ steps.version.outputs.tag }} --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          NOTES_FILE: ${{ steps.cliff.outputs.changelog }}
        run: |
          # Fall back to a placeholder if no conventional commits were found.
          if [ ! -s "$NOTES_FILE" ]; then
            echo "_No notable changes._" > "$NOTES_FILE"
          fi

          EXISTING=$(gh release view "$TAG" --json id,isDraft --jq 'select(.isDraft == true) | .id' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "Reusing existing draft release for $TAG; refreshing notes."
            gh release edit "$TAG" \
              --title "GitPulse v$VERSION" \
              --notes-file "$NOTES_FILE"
            RELEASE_ID="$EXISTING"
          else
            gh release create "$TAG" \
              --draft \
              --title "GitPulse v$VERSION" \
              --notes-file "$NOTES_FILE"
            RELEASE_ID=$(gh release view "$TAG" --json id --jq .id)
          fi
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: false
          args: ${{ matrix.args }}

      - name: Upload signatures and updater bundles
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          set -eu
          # tauri-action uploads the primary bundles (.deb/.rpm/.AppImage/.dmg/.exe)
          # but NOT signature files, and on macOS NOT the .app.tar.gz updater bundle.
          # Upload them here so publish-updater can assemble latest.json.
          tmp=$(mktemp -d)
          uploaded=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            name=$(basename "$f")
            # On macOS, the two arch builds emit identically-named .app.tar.gz
            # files. Insert the target triple before the extension so they
            # don't collide on the release.
            case "$name" in
              *.app.tar.gz|*.app.tar.gz.sig)
                triple=$(echo "$f" | sed -nE 's|.*/target/([^/]+)/release/.*|\1|p')
                if [ -n "$triple" ] && ! echo "$name" | grep -q "$triple"; then
                  renamed=$(echo "$name" | sed "s/\.app\.tar\.gz/_${triple}.app.tar.gz/")
                  cp "$f" "$tmp/$renamed"
                  f="$tmp/$renamed"
                  name="$renamed"
                fi
                ;;
            esac
            echo "Uploading $name"
            gh release upload "$TAG" "$f" --clobber
            uploaded=$((uploaded + 1))
          done < <(find src-tauri/target -type f \( -name "*.sig" -o -name "*.app.tar.gz" \) 2>/dev/null || true)
          echo "Uploaded $uploaded extra updater artifacts."

  publish-updater:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate and upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.create-release.outputs.tag }}
          VERSION: ${{ needs.create-release.outputs.version }}
          REPO: ${{ github.repository }}
        run: node .github/scripts/publish-updater.mjs
