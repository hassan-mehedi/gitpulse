name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - "screenshot.png"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      skip: ${{ steps.create.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: version
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=app-v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check whether tag is already published
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          # Returns "true" only for an *existing, non-draft* release.
          # Drafts and missing releases both leave PUBLISHED empty so the
          # build proceeds (drafts get refreshed below).
          PUBLISHED=$(gh release view "$TAG" --json isDraft --jq 'select(.isDraft == false) | "true"' 2>/dev/null || true)
          if [ "$PUBLISHED" = "true" ]; then
            echo "::notice::Release $TAG is already published; skipping build to avoid tag collision. Bump the version in src-tauri/tauri.conf.json to ship a new release."
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes from commits
        if: steps.check.outputs.published != 'true'
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --tag ${{ steps.version.outputs.tag }} --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          NOTES_FILE: ${{ steps.cliff.outputs.changelog }}
          PUBLISHED: ${{ steps.check.outputs.published }}
        run: |
          if [ "$PUBLISHED" = "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "release_id=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ ! -s "$NOTES_FILE" ]; then
            echo "_No notable changes._" > "$NOTES_FILE"
          fi

          EXISTING=$(gh release view "$TAG" --json id,isDraft --jq 'select(.isDraft == true) | .id' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "Reusing existing draft release for $TAG; refreshing notes."
            gh release edit "$TAG" \
              --title "GitPulse v$VERSION" \
              --notes-file "$NOTES_FILE"
            RELEASE_ID="$EXISTING"
          else
            gh release create "$TAG" \
              --draft \
              --title "GitPulse v$VERSION" \
              --notes-file "$NOTES_FILE"
            RELEASE_ID=$(gh release view "$TAG" --json id --jq .id)
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"

  build:
    needs: create-release
    if: needs.create-release.outputs.skip != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # __VERSION__ is substituted by tauri-action from tauri.conf.json at
          # run time — no dependency on cross-job outputs.
          tagName: app-v__VERSION__
          releaseDraft: true
          args: ${{ matrix.args }}
