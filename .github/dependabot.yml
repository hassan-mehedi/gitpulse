version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      tauri:
        patterns:
          - "@tauri-apps/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"

  - package-ecosystem: cargo
    directory: "/src-tauri"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      tauri:
        patterns:
          - "tauri"
          - "tauri-*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
