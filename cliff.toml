# Configuration for git-cliff (https://git-cliff.org).
# Generates release notes from Conventional Commits between the previous tag
# and the new tag. Run from .github/workflows/release.yml.

[changelog]
header = ""
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }}{% if commit.breaking %} (**breaking**){% endif %} ({{ commit.id | truncate(length=7, end="") }})
{% endfor %}
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
protect_breaking_commits = true

commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactor" },
    { message = "^docs?", group = "Documentation" },
    { message = "^test", group = "Tests" },
    { message = "^build", group = "Build" },
    { message = "^ci", group = "CI" },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore\\(deps\\)", skip = true },
    { message = "^chore", group = "Chores" },
    { message = "^revert", group = "Reverts" },
    { body = ".*BREAKING CHANGE", group = "Breaking Changes" },
    { message = ".*", group = "Other" },
]

filter_commits = false
tag_pattern = "app-v[0-9]+\\.[0-9]+\\.[0-9]+"
topo_order = false
sort_commits = "newest"
